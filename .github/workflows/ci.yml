name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        cc: [gcc, clang]
        exclude:
          - os: macos-latest
            cc: gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install zlib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Install zlib (macOS)
        if: runner.os == 'macOS'
        run: brew install zlib

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-Werror

      - name: Build
        run: cmake --build build

      - name: Smoke test
        run: echo "20" | ./build/primes

  sanitizers:
    name: sanitizers (ASan+UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zlib
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Configure (Debug = sanitizers via CMakeLists generator expression)
        env:
          CC: clang
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Run under sanitizers
        run: echo "20" | ./build/primes

  coverage:
    name: coverage (gcov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zlib
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Configure with coverage flags
        env:
          CC: gcc
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Run the binary to produce .gcda
        run: echo "20" | ./build/primes

      - name: Run gcov and show per-file summary
        run: |
          cd build/CMakeFiles/primes_lib.dir
          gcov primes.c.gcno
          echo "===primes.c.gcov head==="
          head -30 primes.c.gcov
          cd ../primes.dir
          gcov main.c.gcno
          echo "===main.c.gcov head==="
          head -30 main.c.gcov
