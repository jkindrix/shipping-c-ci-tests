name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        cc: [gcc, clang]
        exclude:
          - os: macos-latest
            cc: gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install zlib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Install zlib (macOS)
        if: runner.os == 'macOS'
        run: brew install zlib

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-Werror

      - name: Build
        run: cmake --build build

      - name: Smoke test
        run: echo "20" | ./build/primes
